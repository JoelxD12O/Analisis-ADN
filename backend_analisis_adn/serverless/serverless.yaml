service: analisis-adn

frameworkVersion: '3'

provider:
  name: aws
  runtime: python3.10
  region: us-east-1
  stage: dev

  environment:
    TABLE_NAME: MutacionesTable
    MISSES_TABLE_NAME: MutationMisses

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource:
            - arn:aws:dynamodb:us-east-1:*:table/MutacionesTable
            - arn:aws:dynamodb:us-east-1:*:table/MutationMisses

functions:
  analyzeMutation:
    handler: handler.analyze
    events:
      - httpApi:
          path: /analyze
          method: post

  getMisses:
    handler: handler.get_misses
    events:
      - httpApi:
          path: /misses
          method: get

  createMiss:
    handler: handler.create_miss
    events:
      - httpApi:
          path: /misses
          method: post

  getDbEntries:
    handler: handler.get_db_entries
    events:
      - httpApi:
          path: /db-entries
          method: get

  createDbEntry:
    handler: handler.create_db_entry
    events:
      - httpApi:
          path: /db-entries
          method: post

resources:
  Resources:
    MutacionesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: MutacionesTable
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH

    MutationMisses:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: MutationMisses
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH